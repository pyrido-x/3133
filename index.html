<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3133：网络双人对战版</title>
    <style>
        :root {
            --white: #ffffff;
            --gray: #bdbdbd; 
            --blue-med: #90caf9; 
            --green-med: #a5d6a7; 
            --p1-deep: #b71c1c; 
            --p2-deep: #0d47a1; 
            --orange-mine: rgba(255, 152, 0, 0.4); 
            --purple-mine: rgba(103, 58, 183, 0.4); 
        }

        body { font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; padding: 20px; }
        #main-game-area { display: none; flex-direction: column; align-items: center; width: 100%; }
        #game-layout { display: flex; gap: 20px; margin-top: 10px; align-items: flex-start; }

        #grid { display: grid; border: 2px solid #333; background: #999; gap: 1px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); position: relative; }
        .cell { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 15px; position: relative; cursor: pointer; transition: all 0.2s; box-sizing: border-box; }
        
        .terrain-white { background: var(--white); }
        .terrain-gray { background: var(--gray); cursor: not-allowed; }
        .terrain-blue { background: var(--blue-med); color: #0d47a1; }
        .terrain-green { background: var(--green-med); color: #1b5e20; }

        .cell span { opacity: 0; pointer-events: none; }
        .cell.known span { opacity: 1 !important; }

        .mine-overlay-user { position: absolute; inset: 0; background: var(--orange-mine); pointer-events: none; z-index: 5; border: 2px dashed #ef6c00; }
        .mine-overlay-enemy { position: absolute; inset: 0; background: var(--purple-mine); pointer-events: none; z-index: 5; border: 2px dashed #512da8; }

        .player-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white !important; z-index: 10; font-size: 16px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); border-radius: 2px; }
        .p1-active { background: var(--p1-deep) !important; }
        .p2-active { background: var(--p2-deep) !important; }

        #status-bar { width: 100%; max-width: 850px; display: flex; justify-content: space-around; padding: 15px; background: #fff; border-bottom: 3px solid #eee; margin-bottom: 10px; }
        .status-box { padding: 10px 20px; border-radius: 8px; text-align: center; width: 150px; }
        .p1-ui { border: 2px solid var(--p1-deep); color: var(--p1-deep); }
        .p2-ui { border: 2px solid var(--p2-deep); color: var(--p2-deep); }

        #log-container { width: 300px; height: 512px; background: #fff; border: 1px solid #ddd; overflow-y: auto; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f5f5f5; padding: 8px; border-bottom: 2px solid #ddd; position: sticky; top: 0; }
        td { padding: 6px; text-align: center; border-bottom: 1px solid #eee; }
        
        .overlap-highlight { color: #ff0000 !important; font-weight: bold !important; }

        #controls { margin-top: 15px; display: flex; gap: 20px; align-items: center; justify-content: center; width: 100%; max-width: 900px; flex-direction: column; }
        
        .button-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 600px; }
        button { padding: 8px 16px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-weight: bold; border-radius: 4px; transition: all 0.2s; font-size: 14px; }
        button:hover:not(:disabled) { background: #f0f0f0; }
        button.active { background: #333 !important; color: #fff !important; border-color: #000; box-shadow: 0 0 8px rgba(0,0,0,0.3); }
        button:disabled { background: #e0e0e0 !important; color: #999 !important; border-color: #ccc !important; cursor: not-allowed; opacity: 0.6; }

        #btn-restart { background: #f44336 !important; color: white !important; border: none; }
        #btn-restart:hover { background: #d32f2f !important; }

        #setup-screen { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .setup-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;}
        #path-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 15; }

        .blast-target-highlight { box-shadow: inset 0 0 0 3px #f44336, 0 0 15px #f44336 !important; z-index: 8; }
        .btn-export { background: #4caf50 !important; color: #fff !important; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h1>数字迷雾：网络双人对战版</h1>
            <div style="text-align: center; margin: 30px 0;">
                <p>地图规模 (N): <input type="number" id="input-n" value="10" min="5" max="15"></p>
                <p>输入房间码: <input type="text" id="room-code" value="1234" style="padding: 6px; font-size: 16px; width: 120px; text-align: center; font-weight: bold;"></p>
                <p id="network-status" style="color: #666; font-size: 14px; margin-top: 20px;">输入相同房间码的两人将被分配进同一局游戏</p>
            </div>
            <button id="btn-connect" onclick="connectToRoom()" style="width:250px; height:50px; background:#2196f3; color:white; border:none; border-radius:25px; font-size:18px; cursor:pointer; font-weight: bold;">加入 / 创建房间</button>
        </div>
    </div>

    <div id="main-game-area">
        <div id="status-bar">
            <div class="status-box p1-ui"><b>先手(红) <span id="identity-p1"></span></b><br>SP: <span id="p1-sp">15</span></div>
            <div id="turn-display" style="font-size: 22px; font-weight: bold; align-self: center;">-</div>
            <div class="status-box p2-ui"><b>后手(蓝) <span id="identity-p2"></span></b><br>SP: <span id="p2-sp">15</span></div>
        </div>

        <div id="game-layout">
            <div style="position: relative;">
                <div id="grid"></div>
                <canvas id="path-canvas"></canvas>
            </div>
            <div id="log-container"><table><thead><tr><th>先手 (红)</th><th>后手 (蓝)</th></tr></thead><tbody id="log-body"></tbody></table></div>
        </div>

        <div id="controls">
            <div class="button-group">
                <button id="btn-blink" onclick="toggleMode('blink')">闪 (3SP)</button>
                <button id="btn-blast" onclick="toggleMode('blast')">轰 (7SP)</button>
                <button id="btn-mine" onclick="useMine()">埋雷 (2SP)</button>
                <button id="btn-defuse" onclick="toggleMode('defuse')">拆 (1SP)</button>
                <button id="btn-tree-jump" onclick="toggleMode('tree-jump')">树闪</button>
                <button id="btn-confirm-blast" style="display:none; background:#ff9800; color:#fff;" onclick="executeBlast()">确认轰炸点</button>
            </div>
            <div class="button-group" style="margin-top: 10px;">
                <button class="btn-export" onclick="exportGameData()">导出对局数据</button>
                <button id="btn-restart" onclick="location.reload()">断开并退出</button>
            </div>
            <input type="checkbox" id="overlap-hint" checked style="display:none;"> 
        </div>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
// 🌟 修复重复声明：保留唯一一次 socket 声明
const socket = io();
let N, gridData = [], players = [], currentPlayer = 1, userPlayerId = 1;
let gameActive = false, selectionMode = 'move', blastPath = [];
const TERRAIN = { EMPTY: 'white', MOUNTAIN: 'gray', WATER: 'blue', TREE: 'green' };

let gameActionLog = [];
let myPlayerId = null;       // 玩家本地的网络角色锁定 (1 或 2)
let currentRoomCode = null;  // 当前房间码
let gameWinner = null, gameEndReason = "";

// 1. 网络连接入口
function connectToRoom() {
    const code = document.getElementById('room-code').value.trim();
    if (!code) { alert("请输入房间码！"); return; }
    currentRoomCode = code;
    document.getElementById('network-status').innerText = "正在连接并寻找对手...";
    document.getElementById('btn-connect').disabled = true;
    socket.emit('join_room', currentRoomCode);
}

socket.on('joined', (data) => {
    document.getElementById('network-status').innerText = data.msg;
});

socket.on('room_full', (msg) => {
    alert(msg);
    document.getElementById('btn-connect').disabled = false;
    document.getElementById('network-status').innerText = "请输入相同的房间码加入对局";
});

socket.on('opponent_disconnected', (msg) => {
    alert(msg);
    location.reload();
});

// 2. 收到系统指派角色，游戏正式启动
socket.on('start_game', (data) => {
    myPlayerId = data.role;
    userPlayerId = myPlayerId; // 强行锁定视角：两台设备从此各自只能看自己
    
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('main-game-area').style.display = 'flex';
    
    // 标记阵营UI
    if (myPlayerId === 1) document.getElementById('identity-p1').innerText = "(你)";
    else document.getElementById('identity-p2').innerText = "(你)";

    if (myPlayerId === 1) {
        // 先手房主负责生成共享的基础地图
        N = parseInt(document.getElementById('input-n').value) || 10;
        initGameState();
        sendStateToServer(); // 发送初始数据包
    } else {
        document.getElementById('turn-display').innerText = "接收地图同步中...";
    }
});

// 3. 接收并同步全网数据包
socket.on('state_updated', (gameState) => {
    N = gameState.N;
    gridData = gameState.gridData;
    currentPlayer = gameState.currentPlayer;
    gameActionLog = gameState.gameActionLog;
    
    // 反序列化还原 Set 集合
    players[1] = gameState.players[1];
    players[1].knowledge = new Set(gameState.players[1].knowledge);
    players[2] = gameState.players[2];
    players[2].knowledge = new Set(gameState.players[2].knowledge);
    
    // 如果本地还没画过网格，执行初次绘制
    if (document.getElementById('grid').children.length === 0) {
        buildGridDOM();
    }
    
    rebuildLogUI();
    
    // 判定对手端是否触发了游戏结束
    if (!gameState.gameActive && gameActive) {
        gameActive = false;
        handleLocalEndGameDisplay(gameState.gameWinner, gameState.gameEndReason);
        return;
    }
    
    gameActive = gameState.gameActive;
    gameWinner = gameState.gameWinner;
    gameEndReason = gameState.gameEndReason;
    
    if (currentPlayer === myPlayerId) {
        selectionMode = players[myPlayerId].r === -1 ? 'spawn' : 'move';
    }
    updateUI();
});

// 4. 将本地运算结果打包发给对方
function sendStateToServer() {
    if (!currentRoomCode) return;
    // Set 集合无法通过 JSON 直接传输，需要转为 Array 数组
    const cleanPlayers = {
        1: { ...players[1], knowledge: Array.from(players[1].knowledge) },
        2: { ...players[2], knowledge: Array.from(players[2].knowledge) }
    };
    socket.emit('sync_state', {
        roomCode: currentRoomCode,
        gameState: {
            gridData,
            players: cleanPlayers,
            currentPlayer,
            gameActive,
            gameActionLog,
            gameWinner,
            gameEndReason,
            N
        }
    });
}

function buildGridDOM() {
    const gridEl = document.getElementById('grid');
    gridEl.innerHTML = ''; gridEl.style.gridTemplateColumns = `repeat(${N}, 51px)`;
    for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
            const data = gridData[r][c];
            const cell = document.createElement('div');
            cell.id = `cell-${r}-${c}`; cell.className = `cell terrain-${data.type}`;
            cell.onclick = () => handleCellClick(r, c);
            gridEl.appendChild(cell);
        }
    }
}

function initGameState() {
    gridData = []; players = []; selectionMode = 'spawn'; blastPath = []; gameActionLog = [];
    document.getElementById('log-body').innerHTML = '';
    const canvas = document.getElementById('path-canvas'), ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    let numPool = []; for(let i=100; i<=999; i++) numPool.push(i);
    for(let i = numPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [numPool[i], numPool[j]] = [numPool[j], numPool[i]];
    }

    for (let r = 0; r < N; r++) {
        gridData[r] = [];
        for (let c = 0; c < N; c++) {
            let rand = Math.random();
            let type = rand > 0.5 ? (rand > 0.8 ? (rand > 0.9 ? TERRAIN.TREE : TERRAIN.WATER) : TERRAIN.MOUNTAIN) : TERRAIN.EMPTY;
            gridData[r][c] = { type, num: numPool.pop(), mineP1: false, mineP2: false, rewardUsed: false };
        }
    }
    
    buildGridDOM();

    players[1] = { id: 1, r: -1, c: -1, sp: 15, mud: 0, path: [], knowledge: new Set(), lastKnownEnemyPos: null };
    players[2] = { id: 2, r: -1, c: -1, sp: 15, mud: 0, path: [], knowledge: new Set(), lastKnownEnemyPos: null };
    gameActive = true; updateUI();
}

function handleCellClick(r, c) { 
    // 【限制条件】非己方回合拒绝任何输入
    if (!gameActive || currentPlayer !== myPlayerId) return; 
    processAction(r, c); 
}

function toggleMode(m) { 
    if (currentPlayer !== myPlayerId) return;
    if (selectionMode === m) selectionMode = 'move'; else selectionMode = m; 
    blastPath = []; updateUI(); 
}

function processAction(r, c) {
    const p = players[currentPlayer]; const cell = gridData[r][c];
    if (selectionMode === 'spawn') { if (cell.type !== TERRAIN.EMPTY) return; moveTo(r, c, cell.num); nextTurn(); return; }
    if (selectionMode === 'tree-jump') {
        if (gridData[p.r][p.c].type !== TERRAIN.TREE) { toggleMode('tree-jump'); return; }
        if (canMoveTo(p.r, p.c, r, c, 'tree-jump')) { moveTo(r, c, `树闪→${cell.num}`); nextTurn(); return; }
    }
    if (selectionMode === 'move' && canMoveTo(p.r, p.c, r, c, 'normal')) { moveTo(r, c, cell.num); nextTurn(); }
    else if (selectionMode === 'blink' && p.sp >= 3 && canMoveTo(p.r, p.c, r, c, 'blink')) { p.sp -= 3; moveTo(r, c, `闪→${cell.num}`); nextTurn(); }
    else if (selectionMode === 'blast') handleBlastSelection(r, c);
    else if (selectionMode === 'defuse') {
        if (getDist(p.r, p.c, r, c) === 1 && p.sp >= 1) {
            p.sp -= 1; p.knowledge.add(`${r},${c}`); let enemyId = currentPlayer === 1 ? 2 : 1;
            let res = `拆(${cell.num})${cell['mineP'+enemyId]?' 成功!':''}`;
            cell['mineP'+enemyId] = false; logAction(res); nextTurn();
        }
    }
}

function canMoveTo(sr, sc, tr, tc, mode) {
    if (tr < 0 || tr >= N || tc < 0 || tc >= N) return false;
    const d = getDist(sr, sc, tr, tc); const target = gridData[tr][tc];
    if (target.type === TERRAIN.MOUNTAIN) return false;
    if ((mode === 'blink' || mode === 'tree-jump') && target.type === TERRAIN.WATER) return false;
    if (mode === 'normal') {
        if (gridData[sr][sc].type === TERRAIN.WATER && target.type === TERRAIN.WATER) return isWaterConnected(sr, sc, tr, tc);
        return d === 1 && (sr === tr || sc === tc);
    }
    if (mode === 'blink') return d >= 1 && d <= 3 && gridData[sr][sc].type !== TERRAIN.WATER;
    if (mode === 'tree-jump') return d >= 1 && d <= 3 && gridData[sr][sc].type === TERRAIN.TREE;
    return false;
}

function isWaterConnected(sr, sc, tr, tc) {
    let q = [[sr, sc]], v = new Set([`${sr},${sc}`]); // 🌟 已修复模板字符串写错变量的Bug
    while(q.length) {
        let [r, c] = q.shift(); 
        if (r === tr && c === tc) return true;
        for(let dr=-1; dr<=1; dr++) {
            for(let dc=-1; dc<=1; dc++) {
                let nr=r+dr, nc=c+dc; 
                // 🌟 核心修复：完整加上了 nc >= 0 && nc < N 的列边界守护
                if (nr>=0 && nr<N && nc>=0 && nc<N) { 
                    if (gridData[nr][nc].type===TERRAIN.WATER && !v.has(`${nr},${nc}`)) { 
                        v.add(`${nr},${nc}`); 
                        q.push([nr, nc]); 
                    }
                }
            }
        }
    }
    return false;
}

function moveTo(r, c, logText) {
    const p = players[currentPlayer]; p.r = r; p.c = c; p.path.push({r, c});
    p.knowledge.add(`${r},${c}`); const cell = gridData[r][c]; const enemyId = currentPlayer === 1 ? 2 : 1; const enemy = players[enemyId];
    
    if (getDist(p.r, p.c, enemy.r, enemy.c) <= 1) {
        p.lastKnownEnemyPos = {r: enemy.r, c: enemy.c};
        enemy.lastKnownEnemyPos = {r: p.r, c: p.c};
    }

    if (cell['mineP'+enemy.id]) { logAction(logText); endGame(enemy.id, "踩雷身亡"); return; }
    if (p.r === enemy.r && p.c === enemy.c) { logAction(logText); endGame(currentPlayer, "踩死对手"); return; }
    let bonus = "";
    if (cell.type === TERRAIN.EMPTY && !cell.rewardUsed) {
        let s = cell.num.toString();
        if (s[1] === '1') { let g = Math.max(s[0], s[2]); p.sp += g; cell.rewardUsed = true; bonus = ` (+${g}sp)`; }
        else if (s[1] === '2') { p.mud = 2; bonus = " x"; }
    }
    logAction(logText + bonus);
}

function nextTurn() {
    if (!gameActive) return; 
    blastPath = []; currentPlayer = currentPlayer === 1 ? 2 : 1;
    const p = players[currentPlayer];
    if (p.r !== -1) {
        let canDoAnything = false;
        const onTree = gridData[p.r][p.c].type === TERRAIN.TREE, onWater = gridData[p.r][p.c].type === TERRAIN.WATER;
        for (let r=0; r<N; r++) {
            for (let c=0; c<N; c++) {
                if (canMoveTo(p.r, p.c, r, c, 'normal')) { canDoAnything = true; break; }
                if (p.sp >= 3 && !onWater && canMoveTo(p.r, p.c, r, c, 'blink')) { canDoAnything = true; break; }
                if (onTree && canMoveTo(p.r, p.c, r, c, 'tree-jump')) { canDoAnything = true; break; }
            } if (canDoAnything) break;
        } if (!canDoAnything) { endGame(currentPlayer === 1 ? 2 : 1, "无法逃脱被困死"); return; }
    }
    if (p.mud > 0) { p.mud--; if (p.mud === 1) { logAction("x"); return nextTurn(); } }
    
    if (currentPlayer === myPlayerId) {
        selectionMode = p.r === -1 ? 'spawn' : 'move';
    }
    updateUI(); 
    sendStateToServer(); // 行动完毕，即刻将数据包发射给对手
}

function updateUI() {
    if (!players[1] || !players[2]) return;

    document.getElementById('p1-sp').innerText = players[1].sp;
    document.getElementById('p2-sp').innerText = players[2].sp;
    const td = document.getElementById('turn-display');
    
    if (currentPlayer === myPlayerId) {
        td.innerText = "🔴 轮到你行动！";
        td.style.color = "#4caf50";
    } else {
        td.innerText = "⏳ 对方正思考中...";
        td.style.color = "#9e9e9e";
    }

    const user = players[userPlayerId], enemyId = userPlayerId === 1 ? 2 : 1;

    for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
            const el = document.getElementById(`cell-${r}-${c}`), data = gridData[r][c];
            const isKnown = user.knowledge.has(`${r},${c}`) || !gameActive;
            el.className = `cell terrain-${data.type}`;
            if (isKnown) el.classList.add('known');
            el.innerHTML = `<span>${data.num}</span>`;
            if (selectionMode === 'blast' && blastPath.some(pos => pos.r === r && pos.c === c)) el.classList.add('blast-target-highlight');
            if (data['mineP' + userPlayerId]) {
                const ml = document.createElement('div'); ml.className = "mine-overlay-user"; el.appendChild(ml);
            } else if (data['mineP' + enemyId] && !gameActive) {
                const ml = document.createElement('div'); ml.className = "mine-overlay-enemy"; el.appendChild(ml);
            }
            if (players[userPlayerId].r === r && players[userPlayerId].c === c) {
                const ov = document.createElement('div'); ov.className = `player-overlay p${userPlayerId}-active`; ov.innerText = data.num; el.appendChild(ov);
            } 
            if (players[enemyId].r === r && players[enemyId].c === c) {
                if (isKnown) {
                    const ov = document.createElement('div'); ov.className = `player-overlay p${enemyId}-active`; ov.innerText = data.num; el.appendChild(ov);
                }
            }
        }
    }
    
    // 控制按钮激活与灰色锁定
    const isMyTurn = (currentPlayer === myPlayerId && gameActive);
    const p = players[currentPlayer], onWater = (p && p.r !== -1 && gridData[p.r][p.c].type === TERRAIN.WATER);
    const currentCell = (p && p.r !== -1) ? gridData[p.r][p.c] : null;
    const canPlaceMine = currentCell && currentCell.type === TERRAIN.EMPTY && !currentCell.mineP1 && !currentCell.mineP2;
    
    document.getElementById('btn-blink').disabled = !isMyTurn || (p.sp < 3 || onWater);
    document.getElementById('btn-blast').disabled = !isMyTurn || (p.sp < 7 || onWater);
    document.getElementById('btn-mine').disabled = !isMyTurn || (p.sp < 2 || !canPlaceMine);
    document.getElementById('btn-defuse').disabled = !isMyTurn || (p.sp < 1);
    document.getElementById('btn-tree-jump').disabled = !isMyTurn || (p && p.r !== -1 && gridData[p.r][p.c].type !== TERRAIN.TREE);

    document.querySelectorAll('#controls button').forEach(b => {
        b.classList.remove('active'); if (b.id === 'btn-' + selectionMode) b.classList.add('active');
    });
    document.getElementById('btn-confirm-blast').style.display = (selectionMode === 'blast' && blastPath.length > 0) ? 'inline-block' : 'none';
}

// 统一重绘日志函数
function rebuildLogUI() {
    const tbody = document.getElementById('log-body');
    tbody.innerHTML = '';
    gameActionLog.forEach(log => {
        let r = tbody.insertRow();
        r.insertCell(0).innerText = log.p1 || "";
        r.insertCell(1).innerText = log.p2 || "";
    });

    if (document.getElementById('overlap-hint').checked) {
        const p1Nums = new Set(), p2Nums = new Set(), rows = Array.from(tbody.rows);
        rows.forEach(row => {
            [0, 1].forEach(idx => {
                const cell = row.cells[idx]; if (!cell) return;
                cell.innerHTML = cell.innerText; const matches = cell.innerText.match(/\d{3}/g);
                if (matches) matches.forEach(num => (idx === 0 ? p1Nums.add(num) : p2Nums.add(num)));
            });
        });
        const overlaps = new Set([...p1Nums].filter(x => p2Nums.has(x)));
        if (overlaps.size > 0) {
            rows.forEach(row => {
                [0, 1].forEach(idx => {
                    let content = row.cells[idx].innerText;
                    overlaps.forEach(num => {
                        content = content.replace(new RegExp(num, 'g'), `<span class="overlap-highlight">${num}</span>`);
                    });
                    row.cells[idx].innerHTML = content;
                });
            });
        }
    }
    document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight;
}

function logAction(msg) {
    if (currentPlayer === 1) { 
        gameActionLog.push({ p1: msg, p2: "" });
    } else { 
        if (gameActionLog.length > 0) gameActionLog[gameActionLog.length-1].p2 = msg;
        else gameActionLog.push({ p1: "", p2: msg });
    }
    rebuildLogUI();
}

function useMine() { 
    if (currentPlayer !== myPlayerId) return;
    const p = players[currentPlayer]; const cell = gridData[p.r][p.c];
    if (p.sp >= 2 && cell.type === TERRAIN.EMPTY && !cell.mineP1 && !cell.mineP2) { 
        p.sp -= 2; cell[`mineP${currentPlayer}`] = true; logAction(`${cell.num}埋雷`); nextTurn(); 
    } 
}

function handleBlastSelection(r, c) {
    const p = players[currentPlayer], last = blastPath.length === 0 ? {r: p.r, c: p.c} : blastPath[blastPath.length-1];
    if (getDist(last.r, last.c, r, c) === 1 && gridData[r][c].type !== TERRAIN.WATER && blastPath.length < 3) {
        blastPath.push({r, c}); updateUI();
    }
}

function executeBlast() {
    if (currentPlayer !== myPlayerId) return;
    const p = players[currentPlayer], enemy = players[currentPlayer===1?2:1]; p.sp -= 7;
    let reveal = blastPath.map(pos => { p.knowledge.add(`${pos.r},${pos.c}`); return gridData[pos.r][pos.c].num; });
    logAction(`${gridData[p.r][p.c].num}轰(${reveal.join('→')})`);
    if (blastPath.some(pos => pos.r === enemy.r && pos.c === enemy.c)) endGame(currentPlayer, "轰杀对手"); 
    else nextTurn();
}

function getDist(r1, c1, r2, c2) { return Math.abs(r1-r2) + Math.abs(c1-c2); }

function handleLocalEndGameDisplay(winner, reason) {
    alert(`【结束】${winner === 1 ? '先手(红)' : '后手(蓝)'}胜！\n原因：${reason}`);
    document.querySelectorAll('.cell').forEach(el => el.classList.add('known')); updateUI(); 
    const canvas = document.getElementById('path-canvas'), grid = document.getElementById('grid'); 
    canvas.width = grid.offsetWidth; canvas.height = grid.offsetHeight;
    const ctx = canvas.getContext('2d'), gridRect = grid.getBoundingClientRect();
    const drawP = (p, col) => {
        if (!p || p.path.length < 2) return; ctx.beginPath(); ctx.setLineDash([10, 5]); ctx.strokeStyle = col; ctx.lineWidth = 3;
        p.path.forEach((pos, i) => { 
            const cell = document.getElementById(`cell-${pos.r}-${pos.c}`), rect = cell.getBoundingClientRect();
            const x = rect.left - gridRect.left + rect.width/2, y = rect.top - gridRect.top + rect.height/2;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); 
        }); ctx.stroke();
    };
    drawP(players[1], 'red'); drawP(players[2], 'blue');
}

function endGame(winner, reason) {
    gameActive = false;
    gameWinner = winner;
    gameEndReason = reason;
    handleLocalEndGameDisplay(winner, reason);
    sendStateToServer(); // 同步败局/胜局结果
}

function exportGameData() {
    const data = {
        timestamp: new Date().toISOString(),
        settings: { N: N },
        finalState: {
            p1_sp: players[1].sp, p2_sp: players[2].sp,
            p1_pos: {r: players[1].r, c: players[1].c}, p2_pos: {r: players[2].r, c: players[2].c},
        },
        grid: gridData, logs: gameActionLog
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `game_data_${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
}
</script>
